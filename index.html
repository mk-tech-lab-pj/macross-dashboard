<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マクロス 情報まとめ</title>
  <style>
    :root {
      --bg-primary: #05080f;
      --bg-secondary: #0d1120;
      --bg-card: #111827;
      --bg-card2: #141e30;
      --accent-blue: #4f8ef7;
      --accent-pink: #e066a0;
      --accent-orange: #f5a623;
      --text-primary: #c8d8f0;
      --text-secondary: #7a90b0;
      --text-dim: #3a4a65;
      --border: #1e2d47;
      --border2: #253556;
      --glow-blue: rgba(79,142,247,.35);
      --glow-pink: rgba(224,102,160,.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Segoe UI','Hiragino Kaku Gothic Pro','Meiryo',sans-serif;
      min-height: 100vh; overflow-x: hidden;
    }
    #stars { position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden; }
    .star {
      position:absolute;background:#fff;border-radius:50%;
      animation:twinkle var(--dur,3s) ease-in-out infinite;
      animation-delay:var(--delay,0s);
    }
    @keyframes twinkle { 0%,100%{opacity:.07}50%{opacity:.5} }
    body::before {
      content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.055) 2px,rgba(0,0,0,.055) 4px);
    }

    /* ── Header ── */
    .header {
      position:sticky;top:0;z-index:200;
      background:rgba(5,8,15,.9);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      padding:0 20px;height:58px;
      display:flex;align-items:center;justify-content:space-between;
      box-shadow:0 1px 30px rgba(0,0,0,.5);
    }
    .header-left { display:flex;align-items:center;gap:12px; }
    .emblem {
      width:38px;height:38px;border-radius:50%;
      background:conic-gradient(from 45deg,var(--accent-blue),var(--accent-pink),var(--accent-blue));
      display:flex;align-items:center;justify-content:center;font-size:1.2em;
      box-shadow:0 0 22px var(--glow-blue),0 0 8px var(--glow-pink);
      animation:ep 3s ease-in-out infinite; flex-shrink:0;
    }
    @keyframes ep {
      0%,100%{box-shadow:0 0 22px var(--glow-blue),0 0 8px var(--glow-pink)}
      50%{box-shadow:0 0 40px var(--glow-blue),0 0 20px var(--glow-pink)}
    }
    h1 {
      font-size:1.25em;font-weight:700;letter-spacing:.03em;
      background:linear-gradient(120deg,#7bb5ff 0%,var(--accent-pink) 55%,var(--accent-orange) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .header-right { display:flex;align-items:center;gap:8px;flex-shrink:0; }
    .last-updated {
      font-size:.74em;color:var(--text-secondary);
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:5px;padding:3px 9px;
      display:none;
    }
    .btn-refresh {
      background:linear-gradient(135deg,#1a3a6e,var(--accent-blue));
      color:#fff;border:none;border-radius:7px;padding:7px 14px;
      cursor:pointer;font-size:.82em;font-weight:600;
      box-shadow:0 0 14px rgba(79,142,247,.4);transition:all .2s;
      white-space:nowrap;
    }
    .btn-refresh:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 0 24px rgba(79,142,247,.65);}
    .btn-refresh:disabled{opacity:.45;cursor:not-allowed;transform:none;}

    /* ── Main ── */
    .main { position:relative;z-index:5;max-width:1440px;margin:0 auto;padding:18px 20px 50px; }

    /* ── Loading / Error ── */
    .state-box {
      text-align:center;padding:60px 20px;
      color:var(--text-secondary);
    }
    .state-icon{font-size:2.8em;margin-bottom:14px;opacity:.6;}
    .state-text{font-size:.88em;line-height:1.8;}
    .state-text strong{color:var(--text-primary);}
    .spinner-ring {
      width:40px;height:40px;border-radius:50%;
      border:3px solid rgba(79,142,247,.2);
      border-top-color:var(--accent-blue);
      animation:spin .9s linear infinite;
      margin:0 auto 16px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn-retry {
      margin-top:16px;background:transparent;
      border:1px solid var(--border2);border-radius:7px;
      padding:7px 18px;color:var(--text-secondary);
      cursor:pointer;font-size:.82em;transition:all .2s;
    }
    .btn-retry:hover{border-color:var(--accent-blue);color:var(--accent-blue);}

    /* ── Section ── */
    .section{margin-bottom:32px;}
    .section-head {
      display:flex;align-items:center;gap:12px;margin-bottom:14px;
      padding-bottom:9px;border-bottom:1px solid var(--border);
    }
    .section-label{font-size:1em;font-weight:700;letter-spacing:.08em;color:var(--text-primary);}
    .section-badge {
      font-size:.7em;color:var(--text-secondary);
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:4px;padding:2px 7px;
    }
    .section-divider{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

    /* ── Grid ── */
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    @media(max-width:1080px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){.grid{grid-template-columns:1fr}}

    /* ── Cards ── */
    .cat-card,.person-card{
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:13px;overflow:hidden;display:flex;flex-direction:column;
    }
    .cat-head,.person-head{
      padding:12px 14px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:10px;
    }
    .cat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1em;flex-shrink:0;}
    .person-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2em;flex-shrink:0;}
    .cat-name,.person-name{font-size:.88em;font-weight:600;}
    .cat-count,.person-count{font-size:.7em;color:var(--text-secondary);margin-top:1px;}
    .person-handle{font-size:.7em;color:var(--text-secondary);margin-top:1px;}
    .cat-items,.person-items{padding:10px;flex:1;}

    /* ── Item ── */
    .item{
      background:var(--bg-card2);border:1px solid var(--border);
      border-radius:8px;padding:11px;margin-bottom:8px;
      transition:border-color .2s,background .2s;
    }
    .item:last-child{margin-bottom:0}
    .item:hover{border-color:var(--border2);background:#1a2540}
    .item.past{opacity:.45;filter:grayscale(25%)}
    .item-top{display:flex;align-items:flex-start;gap:7px;margin-bottom:6px}
    .item-title{font-size:.84em;font-weight:600;line-height:1.45;flex:1}
    .date-badge{
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:4px;padding:2px 6px;font-size:.68em;
      color:var(--text-secondary);white-space:nowrap;flex-shrink:0;
    }
    .item-summary{font-size:.78em;color:var(--text-secondary);line-height:1.65;margin-bottom:8px}
    .item-foot{display:flex;align-items:center;justify-content:space-between;gap:7px}
    .item-source{font-size:.7em;color:var(--text-dim)}
    .item-link{font-size:.73em;color:var(--accent-blue);text-decoration:none;display:flex;align-items:center;gap:3px;transition:color .2s;flex-shrink:0}
    .item-link:hover{color:#90bfff;text-decoration:underline}

    /* ── Past ── */
    .past-sect{margin-top:9px}
    .btn-past{
      width:100%;text-align:left;background:transparent;border:1px dashed var(--border);
      border-radius:7px;padding:6px 12px;color:var(--text-secondary);
      cursor:pointer;font-size:.76em;transition:all .2s;
    }
    .btn-past:hover{border-color:var(--border2);color:var(--text-primary)}
    .past-list{margin-top:7px}

    .empty{text-align:center;padding:24px 10px;color:var(--text-dim);font-size:.8em}
  </style>
</head>
<body>

<div id="stars"></div>

<header class="header">
  <div class="header-left">
    <div class="emblem">⚡</div>
    <h1>マクロス 情報まとめ</h1>
  </div>
  <div class="header-right">
    <div class="last-updated" id="last-updated"></div>
    <button class="btn-refresh" id="btn-refresh" onclick="loadData()">🔄 最新データを取得</button>
  </div>
</header>

<main class="main" id="main">
  <div class="state-box" id="state-box">
    <div class="spinner-ring"></div>
    <div class="state-text">データを読み込み中...</div>
  </div>
</main>

<script>
// ── Stars ──
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*1.8+.4;
    s.style.cssText=[`left:${Math.random()*100}%`,`top:${Math.random()*100}%`,
      `width:${sz}px`,`height:${sz}px`,
      `--dur:${(Math.random()*4+2).toFixed(1)}s`,
      `--delay:${(Math.random()*5).toFixed(1)}s`].join(';');
    c.appendChild(s);
  }
})();

// ── Config ──
const JSON_URL='./macross_data.json';

// ── Date helpers ──
function isPast(ds){
  if(!ds) return false;
  const d=new Date(ds); if(isNaN(d.getTime())) return false;
  d.setHours(0,0,0,0); const t=new Date(); t.setHours(0,0,0,0); return d<t;
}
function fmtDate(ds){
  if(!ds) return '日付不明';
  try{const d=new Date(ds);if(isNaN(d.getTime()))return ds;
    return d.toLocaleDateString('ja-JP',{year:'numeric',month:'short',day:'numeric'});}
  catch(e){return ds;}
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Item HTML ──
function itemHtml(it,pastClass){
  const link=it.url
    ?`<a href="${esc(it.url)}" target="_blank" rel="noopener noreferrer" class="item-link">🔗 記事を見る →</a>`:'';
  return `<div class="item ${pastClass}">
    <div class="item-top">
      <div class="item-title">${esc(it.title||'無題')}</div>
      <span class="date-badge">${esc(fmtDate(it.date))}</span>
    </div>
    <div class="item-summary">${esc(it.summary||'')}</div>
    <div class="item-foot"><span class="item-source">${esc(it.source||'')}</span>${link}</div>
  </div>`;
}

// ── Render list ──
function renderList(items){
  if(!items.length) return '<div class="empty">データなし</div>';
  const cur=items.filter(i=>!i.is_past);
  const past=items.filter(i=>i.is_past);
  const uid='u'+Math.random().toString(36).slice(2);
  let html=cur.map(i=>itemHtml(i,'')).join('');
  if(past.length){
    html+=`<div class="past-sect">
      <button class="btn-past" onclick="togglePast('${uid}')">🗂️ 過去の情報（${past.length}件）▼ 見る</button>
      <div class="past-list" id="past-${uid}" style="display:none">${past.map(i=>itemHtml(i,'past')).join('')}</div>
    </div>`;
  }
  return html||'<div class="empty">現在の情報なし</div>';
}

function togglePast(uid){
  const el=document.getElementById('past-'+uid);
  const btn=el.previousElementSibling;
  const open=el.style.display==='none';
  el.style.display=open?'block':'none';
  btn.innerHTML=btn.innerHTML.replace(open?'▼ 見る':'▲ 閉じる',open?'▲ 閉じる':'▼ 見る');
}

// ── Render all ──
function renderAll(store){
  const catDefs=[
    {key:'news',  label:'最新ニュース・発表',icon:'📰',color:'#4f8ef7',bg:'rgba(79,142,247,.15)'},
    {key:'goods', label:'新商品・グッズ',    icon:'🛍️',color:'#e066a0',bg:'rgba(224,102,160,.15)'},
    {key:'events',label:'イベント・ライブ',  icon:'🎤',color:'#f5a623',bg:'rgba(245,166,35,.15)'},
  ];
  const personDefs=[
    {key:'kawamori',name:'河森正治',handle:'@kawamoriexpo',icon:'🎬',color:'#a78bfa',bg:'rgba(139,92,246,.18)',border:'#8b5cf6'},
    {key:'mayn',    name:"May'n",  handle:'@mayn_tw',      icon:'🎤',color:'#34d399',bg:'rgba(16,185,129,.18)', border:'#10b981'},
    {key:'nakajima',name:'中島愛', handle:'@mamegu_staff', icon:'🎵',color:'#fbbf24',bg:'rgba(245,158,11,.18)', border:'#f59e0b'},
  ];

  const catCards=catDefs.map(c=>{
    const items=store[c.key]||[];
    const cur=items.filter(i=>!i.is_past).length;
    return `<div class="cat-card">
      <div class="cat-head" style="border-top:3px solid ${c.color}">
        <div class="cat-icon" style="background:${c.bg};color:${c.color}">${c.icon}</div>
        <div><div class="cat-name">${c.label}</div><div class="cat-count">${items.length}件（現在:${cur}件）</div></div>
      </div>
      <div class="cat-items">${renderList(items)}</div>
    </div>`;
  }).join('');

  const personCards=personDefs.map(p=>{
    const items=store[p.key]||[];
    const cur=items.filter(i=>!i.is_past).length;
    return `<div class="person-card">
      <div class="person-head" style="border-top:3px solid ${p.border}">
        <div class="person-avatar" style="background:${p.bg};color:${p.color}">${p.icon}</div>
        <div>
          <div class="person-name" style="color:${p.color}">${p.name}</div>
          <div class="person-handle">${p.handle}</div>
          <div class="person-count">${items.length}件（現在:${cur}件）</div>
        </div>
      </div>
      <div class="person-items">${renderList(items)}</div>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML=`
    <section class="section">
      <div class="section-head">
        <span class="section-label">🌐 全般</span>
        <span class="section-badge">マクロスシリーズ</span>
        <div class="section-divider"></div>
      </div>
      <div class="grid">${catCards}</div>
    </section>
    <section class="section">
      <div class="section-head">
        <span class="section-label">🎭 キャスト</span>
        <span class="section-badge">関係者の最新動向</span>
        <div class="section-divider"></div>
      </div>
      <div class="grid">${personCards}</div>
    </section>`;
}

// ── Load data from GitHub Pages ──
async function loadData(){
  const btn=document.getElementById('btn-refresh');
  btn.disabled=true;
  document.getElementById('main').innerHTML=`
    <div class="state-box"><div class="spinner-ring"></div><div class="state-text">データを読み込み中...</div></div>`;
  document.getElementById('last-updated').style.display='none';

  try{
    const resp=await fetch(JSON_URL+'?t='+Date.now());
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data=await resp.json();

    const store={news:[],goods:[],events:[],kawamori:[],mayn:[],nakajima:[]};
    for(const it of data.items||[]){
      const ip={...it,is_past:isPast(it.date)};
      if(it.person && store[it.person]!==undefined) store[it.person].push(ip);
      else if(it.category && store[it.category]!==undefined) store[it.category].push(ip);
    }
    renderAll(store);

    const ts=data.collected_at
      ?new Date(data.collected_at).toLocaleString('ja-JP')
      :new Date().toLocaleString('ja-JP');
    const el=document.getElementById('last-updated');
    el.textContent='最終更新: '+ts;
    el.style.display='block';

  }catch(e){
    document.getElementById('main').innerHTML=`
      <div class="state-box">
        <div class="state-icon">📡</div>
        <div class="state-text">
          データの読み込みに失敗しました。<br>
          <strong>スケジューラーがまだ実行されていないか、データが存在しない可能性があります。</strong><br><br>
          サイドバーの「Scheduled」→「Run now」でスケジューラーを実行してください。
        </div>
        <button class="btn-retry" onclick="loadData()">🔄 再試行</button>
      </div>`;
  }finally{
    btn.disabled=false;
  }
}

// ── Auto load on open ──
loadData();
</script>
</body>
</html>
